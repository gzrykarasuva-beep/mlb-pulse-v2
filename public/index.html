<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c0f; --bg2:#111318; --bg3:#1a1d24;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#f0f2f5; --text2:#8a8f9a; --text3:#555a66;
    --accent:#00e87a; --accent2:#0095ff;
    --hot:#ff4d4d; --warm:#ff9500; --purple:#b060ff;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;gap:12px;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px;white-space:nowrap;}
  .logo span{color:var(--accent);}
  .nav{display:flex;gap:6px;}
  .nav-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.15s;}
  .nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}
  .live-badge{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--hot);background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.2);padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--hot);animation:blink 1.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

  .container{max-width:1300px;margin:0 auto;padding:0 28px 60px;}

  .hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0;}
  .stat-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
  .stat-tile .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px;}
  .stat-tile .val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;line-height:1;}
  .stat-tile .sub{font-size:11px;color:var(--text3);margin-top:4px;}
  .green .val{color:var(--accent);} .red .val{color:var(--hot);} .blue .val{color:var(--accent2);}

  .skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .loading-row{height:52px;margin:4px 16px;}

  .status-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;font-family:'DM Mono',monospace;}
  .status-banner.ok{background:rgba(0,232,122,0.06);border:1px solid rgba(0,232,122,0.15);color:var(--accent);}
  .status-banner.err{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);color:var(--hot);}

  .two-col{display:grid;grid-template-columns:1fr 360px;gap:20px;}
  .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
  .section-title span{font-size:11px;font-weight:400;font-family:'DM Mono',monospace;color:var(--text3);margin-left:8px;}

  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--border2);color:var(--text);}
  .filter-btn.on{background:rgba(0,232,122,0.12);border-color:var(--accent);color:var(--accent);}

  .search-wrap{position:relative;margin-bottom:14px;}
  .search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 16px 10px 38px;outline:none;transition:border-color 0.15s;}
  .search-wrap input::placeholder{color:var(--text3);}
  .search-wrap input:focus{border-color:var(--border2);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}

  /* ── TREND TABLE ── */
  .trend-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .trend-row{display:grid;grid-template-columns:28px 28px 1fr 110px 100px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;transition:background 0.12s;}
  .trend-row:last-child{border-bottom:none;}
  .trend-row:hover{background:var(--bg3);}
  .trend-row.selected{background:rgba(0,232,122,0.05);border-left:2px solid var(--accent);padding-left:12px;}
  .trend-row.hdr{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;cursor:default;padding:8px 14px;background:var(--bg2);}
  .trend-row.hdr:hover{background:var(--bg2);}

  .rank{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-align:center;}
  .rank.top{color:var(--accent);font-weight:500;}
  .fire-col{font-size:15px;text-align:center;}
  .p-name{font-weight:500;font-size:13px;color:var(--text);}
  .p-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
  .p-reason{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4;}

  .badge-level{display:inline-block;font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:4px;font-weight:500;margin-left:4px;}
  .badge-mlb{background:rgba(0,149,255,0.15);color:var(--accent2);}
  .badge-aaa{background:rgba(255,149,0,0.12);color:var(--warm);}
  .badge-aa{background:rgba(176,96,255,0.15);color:var(--purple);}
  .badge-a{background:rgba(0,232,122,0.1);color:var(--accent);}

  /* 変化幅表示 */
  .change-block{display:flex;align-items:center;gap:5px;}
  .change-arrow{font-size:14px;font-weight:700;}
  .change-arrow.up{color:var(--accent);}
  .change-arrow.dn{color:var(--hot);}
  .change-vals{display:flex;flex-direction:column;align-items:flex-end;}
  .change-delta{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
  .change-delta.up{color:var(--accent);}
  .change-delta.dn{color:var(--hot);}
  .change-from{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}

  .trend-cell{display:flex;align-items:center;justify-content:flex-end;gap:6px;}
  .trend-bar{height:4px;border-radius:2px;background:var(--border);width:44px;overflow:hidden;}
  .trend-fill{height:100%;border-radius:2px;}
  .t-hot{background:var(--hot);} .t-warm{background:var(--warm);} .t-cool{background:var(--accent);}
  .trend-num{font-family:'DM Mono',monospace;font-size:11px;min-width:24px;text-align:right;}

  /* ── DETAIL PANEL ── */
  .detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;}
  .detail-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .d-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1.1;}
  .d-sub{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px;}

  /* ハイライトボックス（変化幅を大きく） */
  .highlight-boxes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .hl-box{border-radius:var(--radius-sm);padding:12px 14px;text-align:center;}
  .hl-box.up{background:rgba(0,232,122,0.08);border:1px solid rgba(0,232,122,0.2);}
  .hl-box.dn{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);}
  .hl-box.neu{background:var(--bg3);border:1px solid var(--border);}
  .hl-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
  .hl-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-top:4px;line-height:1;}
  .hl-box.up .hl-val{color:var(--accent);}
  .hl-box.dn .hl-val{color:var(--hot);}
  .hl-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .stat-box{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;}
  .s-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
  .s-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-top:3px;}
  .s-delta{font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;}
  .s-delta.up{color:var(--accent);} .s-delta.dn{color:var(--hot);} .s-delta.neu{color:var(--text3);}

  /* スパークチャート */
  .spark-section{margin-top:4px;}
  .spark-label-row{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;justify-content:space-between;}
  .spark-row{display:flex;gap:3px;align-items:flex-end;height:64px;}
  .spark-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .spark-bar{width:100%;border-radius:2px 2px 0 0;min-height:3px;}
  .spark-val{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-align:center;}
  .spark-val.hl{color:var(--accent);}
  .spark-game-row{display:flex;gap:3px;margin-top:3px;}
  .spark-game-lbl{flex:1;font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-align:center;}

  .trend-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .summary-box{text-align:center;}
  .summary-box .s-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
  .summary-box .s-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-top:3px;}
  .summary-box .s-sub{font-size:10px;color:var(--text3);margin-top:2px;}

  .close-btn{background:var(--bg3);border:none;color:var(--text3);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
  .close-btn:hover{color:var(--text);background:var(--border2);}

  /* ── SIDEBAR GAMES ── */
  .sidebar{display:flex;flex-direction:column;gap:12px;}
  .games-scroll{max-height:640px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
  .games-scroll::-webkit-scrollbar{width:3px;}
  .games-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:border-color 0.15s;}
  .game-card.hot{border-color:rgba(255,77,77,0.3);}
  .game-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .g-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--hot);}
  .g-status.final{color:var(--text3);}
  .g-inning{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;}
  .matchup{display:flex;align-items:center;justify-content:space-between;}
  .team{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
  .t-abbr{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
  .t-abbr.win{color:var(--accent);}
  .t-lbl{font-size:10px;color:var(--text3);}
  .t-rec{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
  .scores{display:flex;align-items:center;gap:8px;}
  .score{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;min-width:26px;text-align:center;}
  .score.win{color:var(--accent);}
  .score-sep{color:var(--text3);font-size:16px;}

  .all-games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .db-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color 0.15s;}
  .db-card:hover{border-color:var(--border2);}

  .refresh-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:11px;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
  .refresh-btn:hover{color:var(--accent);border-color:var(--accent);}
  .spin{display:inline-block;animation:rotate 0.8s linear infinite;}
  @keyframes rotate{to{transform:rotate(360deg)}}

  #section-scores,#section-search{display:none;}

  @media(max-width:900px){
    .two-col{grid-template-columns:1fr;}
    .hero-stats{grid-template-columns:repeat(2,1fr);}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .highlight-boxes{grid-template-columns:repeat(2,1fr);}
    header{padding:12px 16px;flex-wrap:wrap;}
    .container{padding:0 16px 40px;}
    .trend-row{grid-template-columns:24px 24px 1fr 90px;}
    .trend-row .hide-sm{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">MLB <span>Pulse</span></div>
  <div class="nav">
    <button class="nav-btn active" onclick="showSection('trends',this)">トレンド</button>
    <button class="nav-btn" onclick="showSection('scores',this)">スコア</button>
    <button class="nav-btn" onclick="showSection('search',this)">選手検索</button>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="container">
  <div class="hero-stats">
    <div class="stat-tile green"><div class="lbl">MLB トレンド選手</div><div class="val" id="h-mlb">—</div><div class="sub">急上昇スコア上位</div></div>
    <div class="stat-tile red"><div class="lbl">マイナー注目</div><div class="val" id="h-minor">—</div><div class="sub">AAA / AA / A+</div></div>
    <div class="stat-tile blue"><div class="lbl">本日の試合</div><div class="val" id="h-games">—</div><div class="sub">ライブ / 終了 / 予定</div></div>
    <div class="stat-tile"><div class="lbl">最終取得</div><div class="val" id="hero-time" style="font-size:18px">—</div><div class="sub">JST 自動更新</div></div>
  </div>

  <!-- TRENDS -->
  <div id="section-trends">
    <div class="two-col">
      <div>
        <div class="section-hd">
          <div class="section-title">トレンド選手 <span id="data-source-lbl">読み込み中...</span></div>
          <button class="refresh-btn" onclick="loadAll()"><span id="refresh-icon">↻</span> 更新</button>
        </div>
        <div id="api-status"></div>
        <div class="filter-row" id="pos-filters">
          <button class="filter-btn on" onclick="setPos('all',this)">すべて</button>
          <button class="filter-btn" onclick="setPos('SP',this)">先発</button>
          <button class="filter-btn" onclick="setPos('RP',this)">リリーフ</button>
          <button class="filter-btn" onclick="setPos('OF',this)">外野</button>
          <button class="filter-btn" onclick="setPos('INF',this)">内野</button>
          <button class="filter-btn" onclick="setPos('C',this)">捕手</button>
          <button class="filter-btn" onclick="setPos('DH',this)">DH</button>
        </div>
        <div class="filter-row" id="lv-filters">
          <button class="filter-btn on" onclick="toggleLevel('MLB',this)">MLB</button>
          <button class="filter-btn" onclick="toggleLevel('AAA',this)">AAA</button>
          <button class="filter-btn" onclick="toggleLevel('AA',this)">AA</button>
          <button class="filter-btn" onclick="toggleLevel('A+',this)">A+</button>
        </div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" placeholder="選手名・チームで検索..." oninput="setSearch(this.value)">
        </div>
        <div class="trend-table" id="trend-table">
          <div class="trend-row hdr">
            <div>#</div><div></div><div>選手 / 変化の理由</div>
            <div style="text-align:right">変化幅</div>
            <div style="text-align:right">急上昇度</div>
          </div>
          <div id="table-loading">
            <div class="skeleton loading-row"></div>
            <div class="skeleton loading-row"></div>
            <div class="skeleton loading-row"></div>
            <div class="skeleton loading-row"></div>
            <div class="skeleton loading-row"></div>
          </div>
        </div>

        <div class="detail-panel" id="detail-panel" style="display:none">
          <div class="detail-hd">
            <div><div class="d-name" id="d-name"></div><div class="d-sub" id="d-sub"></div></div>
            <button class="close-btn" onclick="closeDetail()">×</button>
          </div>
          <!-- 変化幅ハイライト（大きく表示） -->
          <div class="highlight-boxes" id="d-highlights"></div>
          <!-- 通常スタットグリッド -->
          <div class="stat-grid" id="d-stats"></div>
          <!-- スパークチャート -->
          <div class="spark-section">
            <div class="spark-label-row">
              <span>直近10試合の推移（左が古い → 右が最新）</span>
              <span id="spark-range"></span>
            </div>
            <div class="spark-row" id="d-spark"></div>
            <div class="spark-game-row" id="d-spark-lbl"></div>
          </div>
          <div class="trend-summary" id="d-summary"></div>
        </div>
      </div>

      <!-- SIDEBAR GAMES -->
      <div class="sidebar">
        <div class="section-hd">
          <div class="section-title">スコア</div>
          <div style="display:flex;gap:6px;">
            <button class="filter-btn on" onclick="setGameFilter('live',this)">LIVE</button>
            <button class="filter-btn" onclick="setGameFilter('final',this)">終了</button>
            <button class="filter-btn" onclick="setGameFilter('all',this)">全試合</button>
          </div>
        </div>
        <div class="games-scroll" id="live-games">
          <div class="skeleton" style="height:90px;border-radius:12px;"></div>
          <div class="skeleton" style="height:90px;border-radius:12px;"></div>
          <div class="skeleton" style="height:90px;border-radius:12px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCORES -->
  <div id="section-scores">
    <div class="section-hd">
      <div class="section-title">全試合スコア</div>
      <button class="refresh-btn" onclick="loadScores()">↻ 更新</button>
    </div>
    <div class="all-games-grid" id="all-games"></div>
  </div>

  <!-- SEARCH -->
  <div id="section-search">
    <div class="section-hd"><div class="section-title">選手データベース <span id="db-count-lbl"></span></div></div>
    <div class="search-wrap" style="max-width:480px">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="名前・チーム・ポジションで検索..." oninput="dbSearch(this.value)">
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:16px" id="db-results">
      <div style="color:var(--text3);font-size:13px;padding:16px 0">名前・チーム・ポジションを入力してください</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE（変数は1回だけ宣言）
// ═══════════════════════════════════════
let PLAYERS    = [];
let GAMES      = [];
let selectedId = null;
let gameFilter = 'live';
let filt = { pos:'all', levels:['MLB'], q:'' };

// ═══════════════════════════════════════
// フォールバックデータ（API失敗時）
// ═══════════════════════════════════════
const FALLBACK_PLAYERS = [
  // ── MLB 投手
  { id:1,  name:"Paul Skenes",         team:"PIT", org:"PIT", pos:"SP", level:"MLB", age:23, isPit:true,
    era:1.84, whip:0.89, k9:13.2, ip:44, weekEra:0.64, weekWhip:0.72, weekK:18,
    trendScore:96, trendDir:"hot",
    reason:"ERA 1.84 → 直近 0.64 ▼1.20改善 / WHIP 0.89 → 0.72 / K/9=13.2 奪三振急増",

// ═══════════════════════════════════════
// データ読み込み
// ═══════════════════════════════════════
async function loadAll() {
  setRefreshSpin(true);
  await Promise.all([loadPlayers(), loadScores()]);
  setRefreshSpin(false);
  updateTime();
}

async function loadPlayers() {
  try {
    const res = await fetch('/api/players');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    PLAYERS = (data.players || []).map(normalizePlayer);
    setStatus('ok', 'リアルタイムデータを取得しました');
    document.getElementById('data-source-lbl').textContent = 'リアルタイム取得';
  } catch(e) {
    PLAYERS = FALLBACK_PLAYERS;
    setStatus('err', 'API接続エラー — オフラインデータを表示中');
    document.getElementById('data-source-lbl').textContent = 'オフラインデータ';
  }
  document.getElementById('table-loading')?.remove();
  document.getElementById('h-mlb').textContent   = PLAYERS.filter(p=>p.level==='MLB').length;
  document.getElementById('h-minor').textContent = PLAYERS.filter(p=>p.level!=='MLB').length;
  document.getElementById('db-count-lbl').textContent = '全 '+PLAYERS.length+' 選手';
  renderTable();
}

async function loadScores() {
  try {
    const res = await fetch('/api/scores');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    GAMES = (data.games || []).map(g => ({
      away: g.away.abbr, home: g.home.abbr,
      aS: g.away.score, hS: g.home.score,
      status: g.status,
      inning: g.inning ? g.inning+'回'+(g.inningHalf==='Top'?'表':'裏') : '',
      awayRec: g.away.wins+'-'+g.away.losses,
      homeRec: g.home.wins+'-'+g.home.losses,
      hot: g.away.score!=null && g.home.score!=null && Math.abs((g.away.score||0)-(g.home.score||0))<=1,
    }));
    document.getElementById('h-games').textContent = GAMES.length;
  } catch(e) {
    GAMES = FALLBACK_GAMES;
    document.getElementById('h-games').textContent = GAMES.length;
  }
  renderGamesSidebar();
}

function normalizePlayer(p) {
  const isPit = ['SP','RP','P'].includes(p.pos);
  return {
    id: p.id, name: p.name, team: p.team, org: p.org||p.team,
    pos: p.pos, level: p.level, age: p.age, isPit,
    era: p.era, whip: p.whip, k9: p.k9, ip: p.ip,
    weekEra: p.era, weekWhip: p.whip, weekK: null,
    avg: p.avg, ops: p.ops, hr: p.hr, rbi: p.rbi,
    weekAvg: p.avg, weekOps: p.ops, weekHr: null,
    trendScore: p.trendScore, trendDir: p.trendDir,
    reason: buildReason(p, isPit),
    spark: genSpark(p),
  };
}

function buildReason(p, isPit) {
  if (isPit) {
    const era = p.era != null ? fmtE(p.era) : null;
    const k9  = p.k9  != null ? p.k9.toFixed(1) : null;
    const whip = p.whip != null ? fmtE(p.whip) : null;
    const parts = [];
    if (era)  parts.push(`ERA ${era}`);
    if (k9)   parts.push(`K/9 ${k9}`);
    if (whip) parts.push(`WHIP ${whip}`);
    return parts.join(' · ') + ' — 直近成績が上位水準';
  } else {
    const avg = p.avg != null ? fmtA(p.avg) : null;
    const ops = p.ops != null ? fmtO(p.ops) : null;
    const hr  = p.hr  != null ? p.hr+'本塁打' : null;
    const parts = [];
    if (avg) parts.push(`打率 ${avg}`);
    if (ops) parts.push(`OPS ${ops}`);
    if (hr)  parts.push(hr);
    return parts.join(' · ') + ' — 直近成績が上位水準';
  }
}

function genSpark(p) {
  const isPit = ['SP','RP','P'].includes(p.pos);
  const base = isPit ? (p.era||3.5) : (p.avg||0.260);
  return Array.from({length:10}, (_,i) => {
    const noise = (Math.random()-0.5)*(isPit?0.6:0.025);
    const val = base - (isPit?-0.12:0.007)*(i-4) + noise;
    return parseFloat(isPit ? Math.max(0,val).toFixed(2) : Math.max(0.18,Math.min(0.42,val)).toFixed(3));
  });
}

// ═══════════════════════════════════════
// テーブル描画
// ═══════════════════════════════════════
function renderTable() {
  const tbl = document.getElementById('trend-table');
  // 既存の行と空メッセージを両方クリア
  tbl.querySelectorAll('.trend-row:not(.hdr), .tbl-empty').forEach(r=>r.remove());

  const list = PLAYERS.filter(p => {
    const posOk = filt.pos==='all'||p.pos===filt.pos
      ||(filt.pos==='INF'&&['1B','2B','3B','SS'].includes(p.pos))
      ||(filt.pos==='DH'&&p.pos==='DH');
    const lvOk  = filt.levels.includes(p.level);
    const qOk   = !filt.q||p.name.toLowerCase().includes(filt.q)||(p.org||p.team||'').toLowerCase().includes(filt.q);
    return posOk && lvOk && qOk;
  }).sort((a,b) => b.trendScore - a.trendScore);

  if (!list.length) {
    const empty = document.createElement('div');
    empty.className = 'tbl-empty';
    empty.style.cssText = 'padding:24px;text-align:center;color:var(--text3);font-size:13px;';
    empty.textContent = '条件に一致する選手が見つかりません';
    tbl.appendChild(empty);
    return;
  }

  list.forEach((p, i) => {
    const fire = p.trendScore>=90 ? '🔥🔥' : p.trendDir==='hot' ? '🔥' : '📈';
    const tc   = p.trendDir==='hot'?'t-hot':p.trendDir==='warm'?'t-warm':'t-cool';
    const nc   = p.trendDir==='hot'?'var(--hot)':p.trendDir==='warm'?'var(--warm)':'var(--accent)';
    const lv   = lvBadge(p.level);

    // 変化幅（矢印 + 数値）
    let deltaHtml = '';
    if (p.isPit) {
      const d = ((p.era||0)-(p.weekEra||p.era||0));
      const improving = d >= 0;
      deltaHtml = `<div class="change-block">
        <div class="change-arrow ${improving?'up':'dn'}">${improving?'▼':'▲'}</div>
        <div class="change-vals">
          <div class="change-delta ${improving?'up':'dn'}">${Math.abs(d).toFixed(2)}</div>
          <div class="change-from">ERA改善</div>
        </div>
      </div>`;
    } else {
      const d = ((p.weekAvg||p.avg||0)-(p.avg||0));
      const up = d >= 0;
      deltaHtml = `<div class="change-block">
        <div class="change-arrow ${up?'up':'dn'}">${up?'▲':'▼'}</div>
        <div class="change-vals">
          <div class="change-delta ${up?'up':'dn'}">${fmtA(Math.abs(d))}</div>
          <div class="change-from">AVG上昇</div>
        </div>
      </div>`;
    }

    const row = document.createElement('div');
    row.className = 'trend-row' + (selectedId===p.id?' selected':'');
    row.onclick = () => showDetail(p);
    row.innerHTML = `
      <div class="rank ${i<3?'top':''}">${i+1}</div>
      <div class="fire-col">${fire}</div>
      <div>
        <div class="p-name">${p.name}<span class="badge-level ${lv}">${p.level}</span></div>
        <div class="p-meta">${p.org||p.team} · ${p.pos}${p.age?' · '+p.age+'歳':''}</div>
        <div class="p-reason">${p.reason}</div>
      </div>
      ${deltaHtml}
      <div class="trend-cell">
        <div class="trend-bar"><div class="trend-fill ${tc}" style="width:${p.trendScore}%"></div></div>
        <div class="trend-num" style="color:${nc}">${p.trendScore}</div>
      </div>`;
    tbl.appendChild(row);
  });
}

// ═══════════════════════════════════════
// 詳細パネル描画
// ═══════════════════════════════════════
function showDetail(p) {
  selectedId = p.id;
  renderTable();

  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-sub').innerHTML =
    `${p.org||p.team} · ${p.pos}${p.age?' · '+p.age+'歳':''} · <span class="badge-level ${lvBadge(p.level)}">${p.level}</span>`;

  // ── ハイライトボックス（変化幅を大きく表示）
  let hlBoxes;
  if (p.isPit) {
    const eraD  = (p.era||0) - (p.weekEra||p.era||0);
    const whipD = (p.whip||0) - (p.weekWhip||p.whip||0);
    hlBoxes = [
      { lbl:'ERA 改善幅', val:(eraD>=0?'▼':'')+eraD.toFixed(2), sub:fmtE(p.era)+' → '+fmtE(p.weekEra||p.era), cls:eraD>=0?'up':'dn' },
      { lbl:'直近ERA',    val:fmtE(p.weekEra||p.era),            sub:'直近7日',                                  cls:'up' },
      { lbl:'直近K数',    val:(p.weekK||'—')+'K',                sub:'K/9 = '+(p.k9?p.k9.toFixed(1):'—'),       cls:'neu' },
    ];
  } else {
    const avgD = (p.weekAvg||p.avg||0) - (p.avg||0);
    const opsD = (p.weekOps||p.ops||0) - (p.ops||0);
    hlBoxes = [
      { lbl:'AVG 上昇幅', val:(avgD>=0?'▲':'▼')+fmtA(Math.abs(avgD)), sub:fmtA(p.avg)+' → '+fmtA(p.weekAvg||p.avg), cls:avgD>=0?'up':'dn' },
      { lbl:'OPS 上昇幅', val:(opsD>=0?'▲':'▼')+fmtO(Math.abs(opsD)), sub:fmtO(p.ops)+' → '+fmtO(p.weekOps||p.ops), cls:opsD>=0?'up':'dn' },
      { lbl:'直近HR',     val:(p.weekHr!=null?p.weekHr:'—')+'本',      sub:'通算 '+(p.hr||'—')+'本',                   cls:'neu' },
    ];
  }
  document.getElementById('d-highlights').innerHTML = hlBoxes.map(b=>`
    <div class="hl-box ${b.cls}">
      <div class="hl-lbl">${b.lbl}</div>
      <div class="hl-val">${b.val}</div>
      <div class="hl-sub">${b.sub}</div>
    </div>`).join('');

  // ── スタットグリッド
  let statBoxes;
  if (p.isPit) {
    const eD = (p.era||0)-(p.weekEra||p.era||0);
    const wD = (p.whip||0)-(p.weekWhip||p.whip||0);
    statBoxes = [
      { l:'ERA（通算）',  v:fmtE(p.era),              d:'',                                  cls:'neu' },
      { l:'ERA（直近）',  v:fmtE(p.weekEra||p.era),   d:(eD>=0?'▼':'▲')+Math.abs(eD).toFixed(2)+' 改善', cls:eD>=0?'up':'dn' },
      { l:'WHIP（直近）', v:fmtE(p.weekWhip||p.whip), d:(wD>=0?'▼':'▲')+Math.abs(wD).toFixed(2),         cls:wD>=0?'up':'dn' },
      { l:'K/9',          v:p.k9?p.k9.toFixed(1):'—', d:p.ip?p.ip+'IP':'',                  cls:'neu' },
    ];
  } else {
    const aD = (p.weekAvg||p.avg||0)-(p.avg||0);
    const oD = (p.weekOps||p.ops||0)-(p.ops||0);
    statBoxes = [
      { l:'AVG（通算）', v:fmtA(p.avg),            d:'',                                           cls:'neu' },
      { l:'AVG（直近）', v:fmtA(p.weekAvg||p.avg), d:(aD>=0?'▲':'▼')+fmtA(Math.abs(aD))+' 上昇',  cls:aD>=0?'up':'dn' },
      { l:'OPS（直近）', v:fmtO(p.weekOps||p.ops), d:(oD>=0?'▲':'▼')+fmtO(Math.abs(oD)),          cls:oD>=0?'up':'dn' },
      { l:'HR',          v:p.hr??'—',               d:p.rbi?'RBI '+p.rbi:'',                       cls:'neu' },
    ];
  }
  document.getElementById('d-stats').innerHTML = statBoxes.map(b=>`
    <div class="stat-box">
      <div class="s-lbl">${b.l}</div>
      <div class="s-val">${b.v}</div>
      <div class="s-delta ${b.cls}">${b.d||'—'}</div>
    </div>`).join('');

  // ── スパークチャート
  const vals = p.spark || [];
  const mx = Math.max(...vals), mn = Math.min(...vals), rng = mx-mn||0.001;
  document.getElementById('spark-range').textContent =
    p.isPit ? `ERA 最高 ${mx.toFixed(2)} → 最低 ${mn.toFixed(2)}` : `AVG 最低 ${fmtA(mn)} → 最高 ${fmtA(mx)}`;

  const sparkRow = document.getElementById('d-spark');
  const lblRow   = document.getElementById('d-spark-lbl');
  sparkRow.innerHTML = '';
  lblRow.innerHTML   = '';

  vals.forEach((v, i) => {
    const h      = Math.round(((p.isPit ? mx-v : v-mn)/rng)*48+12);
    const isRec  = i >= vals.length-3;
    const isGood = p.isPit ? v<=mn+rng*0.4 : v>=mx-rng*0.4;
    const col    = isRec ? 'var(--accent)' : isGood ? '#1a5c38' : 'var(--bg3)';

    const wrap = document.createElement('div');
    wrap.className = 'spark-bar-wrap';
    const vStr = p.isPit ? v.toFixed(2) : fmtA(v);
    wrap.innerHTML = `
      <div class="spark-val ${isRec?'hl':''}">${vStr}</div>
      <div class="spark-bar" style="height:${h}px;background:${col};width:100%"></div>`;
    sparkRow.appendChild(wrap);

    const gl = document.createElement('div');
    gl.className = 'spark-game-lbl';
    gl.textContent = i===0?'G1':i===vals.length-1?'最新':`${i+1}G`;
    lblRow.appendChild(gl);
  });

  // ── サマリー
  const last3  = vals.slice(-3).reduce((a,b)=>a+b,0)/3;
  const first3 = vals.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const change = p.isPit ? first3-last3 : last3-first3;
  const cStr   = p.isPit ? change.toFixed(2) : fmtA(Math.abs(last3-first3));
  const cLbl   = change>=0 ? (p.isPit?'▼ 改善':'▲ 上昇') : (p.isPit?'▲ 悪化':'▼ 下降');
  const cCol   = change>=0 ? 'var(--accent)' : 'var(--hot)';
  const nc     = p.trendDir==='hot'?'var(--hot)':'var(--warm)';

  document.getElementById('d-summary').innerHTML = `
    <div class="summary-box">
      <div class="s-lbl">急上昇スコア</div>
      <div class="s-val" style="color:${nc}">${p.trendScore}</div>
      <div class="s-sub">/100</div>
    </div>
    <div class="summary-box">
      <div class="s-lbl">10試合 変化幅</div>
      <div class="s-val" style="color:${cCol}">${cStr}</div>
      <div class="s-sub">${cLbl}</div>
    </div>
    <div class="summary-box">
      <div class="s-lbl">直近3試合 平均</div>
      <div class="s-val">${p.isPit?last3.toFixed(2):fmtA(last3)}</div>
      <div class="s-sub">${p.isPit?'ERA':'AVG'}</div>
    </div>`;

  document.getElementById('detail-panel').style.display = '';
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detail-panel').style.display = 'none';
  renderTable();
}

// ═══════════════════════════════════════
// 試合スコア描画
// ═══════════════════════════════════════
function renderGamesSidebar() {
  const container = document.getElementById('live-games');
  let list = GAMES;
  if (gameFilter==='live')  list = GAMES.filter(g=>g.status==='Live');
  if (gameFilter==='final') list = GAMES.filter(g=>g.status==='Final');
  renderGameCards(container, list);
}

function renderGameCards(container, list) {
  container.innerHTML = '';
  if (!list.length) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">該当する試合はありません</div>';
    return;
  }
  list.forEach(g => {
    const hW = g.hS!=null && g.aS!=null && g.hS>g.aS;
    const aW = g.hS!=null && g.aS!=null && g.aS>g.hS;
    const el = document.createElement('div');
    el.className = 'game-card'+(g.hot?' hot':'');
    el.innerHTML = `
      <div class="game-hd">
        <span class="g-status ${g.status==='Final'?'final':''}">${g.status==='Live'?'● LIVE':g.status==='Final'?'終了':'予定'}</span>
        <span class="g-inning">${g.inning||''}</span>
      </div>
      <div class="matchup">
        <div class="team"><div class="t-abbr ${aW?'win':''}">${g.away}</div><div class="t-rec">${g.awayRec||''}</div></div>
        <div class="scores">
          <div class="score ${aW?'win':''}">${g.aS??'—'}</div>
          <div class="score-sep">–</div>
          <div class="score ${hW?'win':''}">${g.hS??'—'}</div>
        </div>
        <div class="team"><div class="t-abbr ${hW?'win':''}">${g.home}</div><div class="t-rec">${g.homeRec||''}</div></div>
      </div>`;
    container.appendChild(el);
  });
}

// ═══════════════════════════════════════
// フィルター・ナビゲーション
// ═══════════════════════════════════════
function setPos(pos, btn) {
  filt.pos = pos;
  document.querySelectorAll('#pos-filters .filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTable();
}

function toggleLevel(lv, btn) {
  const i = filt.levels.indexOf(lv);
  if (i===-1) { filt.levels.push(lv); btn.classList.add('on'); }
  else if (filt.levels.length > 1) { filt.levels.splice(i,1); btn.classList.remove('on'); }
  renderTable();
}

function setSearch(v) { filt.q = v.toLowerCase(); renderTable(); }

function setGameFilter(type, btn) {
  gameFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    if(['LIVE','終了','全試合'].includes(b.textContent)) b.classList.remove('on');
  });
  btn.classList.add('on');
  renderGamesSidebar();
}

function dbSearch(v) {
  const res = document.getElementById('db-results');
  if (!v || v.length < 1) {
    res.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px 0">名前・チーム・ポジションを入力してください</div>';
    return;
  }
  const found = PLAYERS.filter(p =>
    p.name.toLowerCase().includes(v.toLowerCase()) ||
    (p.org||p.team||'').toLowerCase().includes(v.toLowerCase()) ||
    p.pos.toLowerCase().includes(v.toLowerCase()) ||
    p.level.toLowerCase().includes(v.toLowerCase())
  );
  if (!found.length) { res.innerHTML = `<div style="color:var(--text3);font-size:13px;padding:16px 0">「${v}」に一致する選手が見つかりません</div>`; return; }
  res.innerHTML = found.map(p => {
    const nc = p.trendDir==='hot'?'var(--hot)':'var(--warm)';
    const main = p.isPit ? { l:'ERA', v:fmtE(p.era), w:fmtE(p.weekEra||p.era) } : { l:'AVG', v:fmtA(p.avg), w:fmtA(p.weekAvg||p.avg) };
    return `<div class="db-card" onclick="showSection('trends'); setTimeout(()=>showDetail(PLAYERS.find(x=>x.id===${p.id})),50)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px">${p.name}</div>
          <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${p.org||p.team} · ${p.pos} · <span class="badge-level ${lvBadge(p.level)}">${p.level}</span></div>
        </div>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:${nc}">${p.trendScore}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${main.l} 通算</div>
          <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-top:2px">${main.v}</div>
        </div>
        <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${main.l} 直近</div>
          <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-top:2px;color:var(--accent)">${main.w}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:8px;line-height:1.5">${p.reason||''}</div>
    </div>`;
  }).join('');
}

function showSection(id, btn) {
  ['trends','scores','search'].forEach(s=>{
    document.getElementById('section-'+s).style.display = s===id?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const idx = ['trends','scores','search'].indexOf(id);
    document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  }
  if (id==='scores') renderGameCards(document.getElementById('all-games'), GAMES);
}

// ═══════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════
function fmtA(v){ return v!=null ? '.'+String(Math.round(v*1000)).padStart(3,'0') : '.---'; }
function fmtE(v){ return v!=null ? v.toFixed(2) : '-.-'; }
function fmtO(v){ return v!=null ? v.toFixed(3) : '.---'; }

function lvBadge(lv){
  if(lv==='MLB') return 'badge-level badge-mlb';
  if(lv==='AAA') return 'badge-level badge-aaa';
  if(lv==='AA')  return 'badge-level badge-aa';
  return 'badge-level badge-a';
}

function setStatus(type, msg){
  const el = document.getElementById('api-status');
  if (!el) return;
  el.innerHTML = `<div class="status-banner ${type}">${msg}</div>`;
  if (type==='ok') setTimeout(()=>{ el.innerHTML=''; }, 4000);
}

function setRefreshSpin(on){
  const el = document.getElementById('refresh-icon');
  if (el) el.className = on ? 'spin' : '';
}

function updateTime(){
  const now = new Date();
  const h = String((now.getUTCHours()+9)%24).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const el = document.getElementById('hero-time');
  if (el) el.textContent = h+':'+m;
}

// ═══════════════════════════════════════
// 起動
// ═══════════════════════════════════════
loadAll();
updateTime();
setInterval(loadAll, 5 * 60 * 1000); // 5分ごと自動更新
</script>
